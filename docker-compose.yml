services:
  # FastAPI application
  api:
    build: .
    command: bash -c "/app/scraper/scripts/setup_dirs.sh && uvicorn main:app --host ${API_HOST} --port ${API_PORT} --reload --log-level debug"
    volumes:
      - .:/app
      - ./data:/app/data
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      # Database Configuration
      - NEON_DB_URL=${NEON_DB_URL}
      # Redis Configuration
      - REDIS_URL=${REDIS_URL}
      # API Configuration
      - DEBUG=${DEBUG:-false}
      - API_PREFIX=${API_PREFIX:-/api}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_VERSION=${API_VERSION:-1.0.0}
      # Crags Site Configuration
      - CRAGS_BASE_URL=${CRAGS_BASE_URL}
      - CRAGS_USERNAME=${CRAGS_USERNAME}
      - CRAGS_USERALIAS=${CRAGS_USERALIAS}
      - CRAGS_PASSWORD=${CRAGS_PASSWORD}
      # Scraper Configuration
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - MIN_REQUEST_INTERVAL=${MIN_REQUEST_INTERVAL:-1.7}
      - RETRY_DELAY=${RETRY_DELAY:-5}
      - USER_AGENT_1=${USER_AGENT_1}
      - USER_AGENT_2=${USER_AGENT_2}
      - USER_AGENT_3=${USER_AGENT_3}
      - USER_AGENT_4=${USER_AGENT_4}
      - USER_AGENT_5=${USER_AGENT_5}
      - TZ=${TZ:-UTC}
      - USE_PLAYWRIGHT=${USE_PLAYWRIGHT:-true}
      - USE_PLAYWRIGHT_LOGIN=${USE_PLAYWRIGHT_LOGIN:-true}
      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Competition Configuration
      - MIN_TEAM_SIZE=${MIN_TEAM_SIZE:-2}
      - MAX_TEAM_SIZE=${MAX_TEAM_SIZE:-4}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    command: bash -c "/app/scraper/scripts/setup_dirs.sh && celery -A tasks.celery_app worker --loglevel=debug"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      # Database Configuration
      - NEON_DB_URL=${NEON_DB_URL}
      # Redis Configuration
      - REDIS_URL=${REDIS_URL}
      # API Configuration
      - DEBUG=${DEBUG:-false}
      - API_PREFIX=${API_PREFIX:-/api}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_VERSION=${API_VERSION:-1.0.0}
      # Crags Site Configuration
      - CRAGS_BASE_URL=${CRAGS_BASE_URL}
      - CRAGS_USERNAME=${CRAGS_USERNAME}
      - CRAGS_USERALIAS=${CRAGS_USERALIAS}
      - CRAGS_PASSWORD=${CRAGS_PASSWORD}
      # Scraper Configuration
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - MIN_REQUEST_INTERVAL=${MIN_REQUEST_INTERVAL:-1.7}
      - RETRY_DELAY=${RETRY_DELAY:-5}
      - USER_AGENT_1=${USER_AGENT_1}
      - USER_AGENT_2=${USER_AGENT_2}
      - USER_AGENT_3=${USER_AGENT_3}
      - USER_AGENT_4=${USER_AGENT_4}
      - USER_AGENT_5=${USER_AGENT_5}
      - TZ=${TZ:-UTC}
      - USE_PLAYWRIGHT=${USE_PLAYWRIGHT:-true}
      - USE_PLAYWRIGHT_LOGIN=${USE_PLAYWRIGHT_LOGIN:-true}
      # Cloudinary Configuration
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      # Competition Configuration
      - MIN_TEAM_SIZE=${MIN_TEAM_SIZE:-2}
      - MAX_TEAM_SIZE=${MAX_TEAM_SIZE:-4}
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (for Celery broker)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data: