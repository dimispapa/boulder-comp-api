[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Define markers for test types
markers =
    api: marks tests as API tests
    xfail: marks tests as expected to fail
    redis: marks tests that require Redis to be running
    
# Define test paths
testpaths = tests/api tests/scraper

# Skip Redis tests by default since they require Redis to be running
addopts = -k "not redis" 